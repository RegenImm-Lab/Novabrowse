name: novabrowse

services:

  app:
    cap_drop:
      - ALL

    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"

    volumes:
      - ../1_subject_sequences:/project/1_subject_sequences
      - ../2_subject_blastdb:/project/2_subject_blastdb
      - ../3_query_sequences:/project/3_query_sequences
      - ../4_blast_results:/project/4_blast_results

      - ../chromosome_data.json:/project/chromosome_data.json:ro

      - ./novabrowse_output:/project/novabrowse_output
      - ncbi_cache:/project/ncbi_cache

    env_file:
      - novabrowse.env

volumes:
  ncbi_cache:
